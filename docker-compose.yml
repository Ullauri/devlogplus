services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./workspace:/app/workspace
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir backend

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: devlogplus
      POSTGRES_PASSWORD: devlogplus
      POSTGRES_DB: devlogplus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlogplus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
