name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# ─── Jobs ────────────────────────────────────────────────────────────
# 1. lint          – fast formatting & lint checks (backend + frontend)
# 2. test-backend  – pytest with testcontainers (needs Docker)
# 3. test-frontend – vitest unit + architecture tests
# ─────────────────────────────────────────────────────────────────────

jobs:
  # ── Formatting & Linting (fast gate) ─────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install Python dependencies
        run: poetry install --only dev --no-interaction

      - name: Ruff format check
        run: poetry run ruff format --check backend/

      - name: Ruff lint check
        run: poetry run ruff check backend/

      # ── Node / Frontend ─────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Prettier format check
        working-directory: frontend
        run: npm run format:check

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript type-check
        working-directory: frontend
        run: npm run typecheck

  # ── Backend Tests ────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('pyproject.toml', 'poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install Python dependencies
        run: poetry install --no-interaction

      - name: Run unit & integration tests
        run: >
          poetry run pytest backend/tests -v
          --cov=backend/app
          --cov-report=term-missing
          --cov-report=xml:coverage-backend.xml
          -x

      - name: Run architecture tests
        run: poetry run pytest backend/tests/test_architecture.py -v

      - name: Verify OpenAPI spec is up to date
        run: poetry run python scripts/export_openapi.py --check

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage-backend.xml
          retention-days: 7

  # ── Frontend Tests ───────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: Run architecture tests
        working-directory: frontend
        run: npx vitest run src/test/architecture.test.ts

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 7
